  .container { max-width: 1200px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 20px; color: #333; }
  
  .panel { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  
  .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label { font-size: 14px; color: #555; font-weight: 500; }
  .control-group input[type="range"] { width: 100%; }
  .control-group select, .control-group input[type="number"] {
    padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;
  }
  
  .upload-area {
    border: 2px dashed #ccc; border-radius: 12px; padding: 40px; text-align: center;
    cursor: pointer; transition: all 0.3s; background: #fafafa;
  }
  .upload-area:hover { border-color: #6366f1; background: #f0f0ff; }
  .upload-area.dragover { border-color: #6366f1; background: #e8e8ff; }
  .upload-area p { color: #666; margin-top: 10px; }
  
  .preview-area { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 800px) { .preview-area { grid-template-columns: 1fr; } }
  
  .canvas-wrapper {
    background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; align-items: center;
  }
  .canvas-wrapper h3 { margin-bottom: 10px; color: #444; font-size: 16px; }
  canvas { max-width: 100%; border: 1px solid #eee; border-radius: 4px; image-rendering: pixelated; }
  
  .color-list {
    max-height: 300px; overflow-y: auto; margin-top: 15px; width: 100%;
    border: 1px solid #eee; border-radius: 8px;
  }
  .color-item {
    display: flex; align-items: center; padding: 8px 12px; border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
  }
  .color-item:last-child { border-bottom: none; }
  .color-swatch { width: 20px; height: 20px; border-radius: 4px; margin-right: 10px; border: 1px solid #ddd; }
  .color-code { font-weight: 600; width: 50px; }
  .color-count { margin-left: auto; color: #888; }
  
  .btn-row { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500; transition: all 0.2s;
  }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-secondary { background: #e5e7eb; color: #374151; }
  .btn-secondary:hover { background: #d1d5db; }
  
  .value-display { font-size: 12px; color: #888; }

  .checkbox-group {
    flex-direction: row; align-items: center; justify-content: space-between;
  }
  .checkbox-group input[type="checkbox"] {
    width: 18px; height: 18px; cursor: pointer;
  }
</style>

<div class="container">

</div>

// ========== 颜色工具：CIEDE2000 专业色差 ==========
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function rgbToLab(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  r = r > 0.04045 ? Math.pow((r + 0.055) / 1.055, 2.4) : r / 12.92;
  g = g > 0.04045 ? Math.pow((g + 0.055) / 1.055, 2.4) : g / 12.92;
  b = b > 0.04045 ? Math.pow((b + 0.055) / 1.055, 2.4) : b / 12.92;
  
  let x = (r * 0.4124 + g * 0.3576 + b * 0.1805) / 0.95047;
  let y = (r * 0.2126 + g * 0.7152 + b * 0.0722) / 1.00000;
  let z = (r * 0.0193 + g * 0.1192 + b * 0.9505) / 1.08883;
  
  x = x > 0.008856 ? Math.pow(x, 1/3) : 7.787 * x + 16/116;
  y = y > 0.008856 ? Math.pow(y, 1/3) : 7.787 * y + 16/116;
  z = z > 0.008856 ? Math.pow(z, 1/3) : 7.787 * z + 16/116;
  
  return [116 * y - 16, 500 * (x - y), 200 * (y - z)];
}

function colorDistanceCIEDE2000(lab1, lab2) {
  const [L1, a1, b1] = lab1;
  const [L2, a2, b2] = lab2;
  
  const C1 = Math.sqrt(a1*a1 + b1*b1);
  const C2 = Math.sqrt(a2*a2 + b2*b2);
  const Cbar = (C1 + C2) / 2;
  
  const G = 0.5 * (1 - Math.sqrt(Math.pow(Cbar, 7) / (Math.pow(Cbar, 7) + Math.pow(25, 7))));
  const a1p = a1 * (1 + G);
  const a2p = a2 * (1 + G);
  
  const C1p = Math.sqrt(a1p*a1p + b1*b1);
  const C2p = Math.sqrt(a2p*a2p + b2*b2);
  const Cbarp = (C1p + C2p) / 2;
  
  let h1p = Math.atan2(b1, a1p);
  if (h1p < 0) h1p += 2 * Math.PI;
  let h2p = Math.atan2(b2, a2p);
  if (h2p < 0) h2p += 2 * Math.PI;
  
  const dLp = L2 - L1;
  const dCp = C2p - C1p;
  
  let dhp = h2p - h1p;
  if (Math.abs(dhp) > Math.PI) {
    if (h2p <= h1p) dhp += 2 * Math.PI;
    else dhp -= 2 * Math.PI;
  }
  const dHp = 2 * Math.sqrt(C1p * C2p) * Math.sin(dhp / 2);
  
  const Lbarp = (L1 + L2) / 2;
  const Hbarp = Math.abs(h1p - h2p) > Math.PI 
    ? (h1p + h2p + 2 * Math.PI) / 2 
    : (h1p + h2p) / 2;
  
  const T = 1 
    - 0.17 * Math.cos(Hbarp - Math.PI/6) 
    + 0.24 * Math.cos(2 * Hbarp) 
    + 0.32 * Math.cos(3 * Hbarp + Math.PI/30) 
    - 0.20 * Math.cos(4 * Hbarp - 63 * Math.PI/180);
  
  const dTheta = 30 * Math.PI / 180 * Math.exp(-Math.pow((Hbarp - 275 * Math.PI/180) / (25 * Math.PI/180), 2));
  const RC = 2 * Math.sqrt(Math.pow(Cbarp, 7) / (Math.pow(Cbarp, 7) + Math.pow(25, 7)));
  const SL = 1 + (0.015 * Math.pow(Lbarp - 50, 2)) / Math.sqrt(20 + Math.pow(Lbarp - 50, 2));
  const SC = 1 + 0.045 * Cbarp;
  const SH = 1 + 0.015 * Cbarp * T;
  const RT = -Math.sin(2 * dTheta) * RC;
  
  const dE = Math.sqrt(
    Math.pow(dLp / SL, 2) +
    Math.pow(dCp / SC, 2) +
    Math.pow(dHp / SH, 2) +
    RT * (dCp / SC) * (dHp / SH)
  );
  return dE;
}

function findNearestBead(r, g, b, palette) {
  const lab = rgbToLab(r, g, b);
  let minDist = Infinity;
  let nearest = palette[0];
  
  for (const bead of palette) {
    const [br, bg, bb] = hexToRgb(bead.hex);
    const beadLab = rgbToLab(br, bg, bb);
    const dist = colorDistanceCIEDE2000(lab, beadLab);
    if (dist < minDist) {
      minDist = dist;
      nearest = bead;
    }
  }
  return nearest;
}

function isLightColor(hex) {
  const [r, g, b] = hexToRgb(hex);
  const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return luminance > 0.55;
}

// ========== 优化版背景去除：八连通 + 多背景色 ==========
function removeBackground(imgData, width, height, tolerance) {
  const data = imgData.data;
  const visited = new Uint8Array(width * height);
  const queue = [];

  const edgePixels = [];
  for (let x = 0; x < width; x++) {
    const i = (0 * width + x) * 4;
    edgePixels.push([data[i], data[i+1], data[i+2]]);
  }
  for (let x = 0; x < width; x++) {
    const i = ((height - 1) * width + x) * 4;
    edgePixels.push([data[i], data[i+1], data[i+2]]);
  }
  for (let y = 1; y < height - 1; y++) {
    const i = (y * width + 0) * 4;
    edgePixels.push([data[i], data[i+1], data[i+2]]);
  }
  for (let y = 1; y < height - 1; y++) {
    const i = (y * width + (width - 1)) * 4;
    edgePixels.push([data[i], data[i+1], data[i+2]]);
  }

  const bgColors = [];
  const used = new Uint8Array(edgePixels.length);
  
  for (let k = 0; k < 2; k++) {
    let maxCount = 0;
    let centerR = 255, centerG = 255, centerB = 255;
    
    for (let i = 0; i < edgePixels.length; i++) {
      if (used[i]) continue;
      const [r, g, b] = edgePixels[i];
      let count = 0;
      for (let j = 0; j < edgePixels.length; j++) {
        if (used[j]) continue;
        const dr = Math.abs(edgePixels[j][0] - r);
        const dg = Math.abs(edgePixels[j][1] - g);
        const db = Math.abs(edgePixels[j][2] - b);
        if (dr + dg + db <= tolerance) count++;
      }
      if (count > maxCount) {
        maxCount = count;
        centerR = r; centerG = g; centerB = b;
      }
    }
    
    if (maxCount > edgePixels.length * 0.1) {
      bgColors.push([centerR, centerG, centerB]);
      for (let i = 0; i < edgePixels.length; i++) {
        if (used[i]) continue;
        const dr = Math.abs(edgePixels[i][0] - centerR);
        const dg = Math.abs(edgePixels[i][1] - centerG);
        const db = Math.abs(edgePixels[i][2] - centerB);
        if (dr + dg + db <= tolerance) used[i] = 1;
      }
    }
  }

  if (bgColors.length === 0) bgColors.push([255, 255, 255]);

  const add = (x, y) => {
    if (x < 0 || x >= width || y < 0 || y >= height) return;
    const idx = y * width + x;
    if (visited[idx]) return;
    const i = idx * 4;
    const r = data[i], g = data[i+1], b = data[i+2];
    
    let isBg = false;
    for (const [br, bg, bb] of bgColors) {
      const dr = Math.abs(r - br);
      const dg = Math.abs(g - bg);
      const db = Math.abs(b - bb);
      if (dr + dg + db <= tolerance) {
        isBg = true;
        break;
      }
    }
    
    if (isBg) {
      visited[idx] = 1;
      queue.push({ x, y });
    }
  };

  for (let x = 0; x < width; x++) add(x, 0);
  for (let x = 0; x < width; x++) add(x, height - 1);
  for (let y = 1; y < height - 1; y++) add(0, y);
  for (let y = 1; y < height - 1; y++) add(width - 1, y);

  while (queue.length) {
    const { x, y } = queue.shift();
    add(x - 1, y);
    add(x + 1, y);
    add(x, y - 1);
    add(x, y + 1);
    add(x - 1, y - 1);
    add(x + 1, y - 1);
    add(x - 1, y + 1);
    add(x + 1, y + 1);
  }

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      if (visited[y * width + x]) {
        data[(y * width + x) * 4 + 3] = 0;
      }
    }
  }
  return imgData;
}

// ========== 主逻辑 ==========
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const originalCanvas = document.getElementById('originalCanvas');
const resultCanvas = document.getElementById('resultCanvas');
const gridWidthInput = document.getElementById('gridWidth');
const maxColorsInput = document.getElementById('maxColors');
const brandSelect = document.getElementById('brandSelect');
const displayMode = document.getElementById('displayMode');
const colorListEl = document.getElementById('colorList');
const downloadBtn = document.getElementById('downloadBtn');
const downloadListBtn = document.getElementById('downloadListBtn');
const autoRemoveBgCheckbox = document.getElementById('autoRemoveBg');
const bgToleranceInput = document.getElementById('bgTolerance');
const codeScaleInput = document.getElementById('codeScale');

let originalImage = null;
let gridWidth = 30;
let maxColors = 20;
let currentPalette = [];
let resultData = null;

const CELL_PHYSICAL_SIZE = 24;

function updatePalette() {
  currentPalette = beadPalettes.mard;
  if (originalImage) generateTemplate();
}

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      originalImage = img;
      drawOriginal();
      generateTemplate();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawOriginal() {
  const ctx = originalCanvas.getContext('2d');
  const maxSize = 400;
  let w = originalImage.width, h = originalImage.height;
  if (w > h) { h = h * maxSize / w; w = maxSize; }
  else { w = w * maxSize / h; h = maxSize; }
  originalCanvas.width = w;
  originalCanvas.height = h;
  ctx.drawImage(originalImage, 0, 0, w, h);
}

function generateTemplate() {
  if (!originalImage) return;
  
  const palette = currentPalette;
  const autoRemoveBg = autoRemoveBgCheckbox.checked;
  const tolerance = parseInt(bgToleranceInput.value) || 35;
  
  const aspect = originalImage.height / originalImage.width;
  const gridH = Math.round(gridWidth * aspect);
  
  const offscreen = document.createElement('canvas');
  offscreen.width = gridWidth;
  offscreen.height = gridH;
  const offCtx = offscreen.getContext('2d');
  offCtx.imageSmoothingEnabled = true;
  offCtx.drawImage(originalImage, 0, 0, gridWidth, gridH);
  
  let imgData = offCtx.getImageData(0, 0, gridWidth, gridH);
  
  if (autoRemoveBg) {
    imgData = removeBackground(imgData, gridWidth, gridH, tolerance);
  }
  
  const data = imgData.data;
  const grid = [];
  const colorCounts = new Map();
  
  for (let y = 0; y < gridH; y++) {
    const row = [];
    for (let x = 0; x < gridWidth; x++) {
      const idx = (y * gridWidth + x) * 4;
      const r = data[idx];
      const g = data[idx + 1];
      const b = data[idx + 2];
      const a = data[idx + 3];
      
      if (a < 50) {
        row.push(null);
        continue;
      }
      
      const bead = findNearestBead(r, g, b, palette);
      row.push(bead);
      colorCounts.set(bead.code, (colorCounts.get(bead.code) || 0) + 1);
    }
    grid.push(row);
  }
  
  if (colorCounts.size > maxColors) {
    const sorted = [...colorCounts.entries()].sort((a, b) => b[1] - a[1]);
    const keepCodes = new Set(sorted.slice(0, maxColors).map(s => s[0]));
    const keepBeads = palette.filter(b => keepCodes.has(b.code));
    
    colorCounts.clear();
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridWidth; x++) {
        const bead = grid[y][x];
        if (!bead) continue;
        let finalBead = bead;
        if (!keepCodes.has(bead.code)) {
          const [r, g, b] = hexToRgb(bead.hex);
          finalBead = findNearestBead(r, g, b, keepBeads);
          grid[y][x] = finalBead;
        }
        colorCounts.set(finalBead.code, (colorCounts.get(finalBead.code) || 0) + 1);
      }
    }
  }
  
  resultData = { grid, gridW: gridWidth, gridH, colorCounts };
  drawResult();
  renderColorList();
}

function drawResult() {
  if (!resultData) return;
  
  const { grid, gridW, gridH } = resultData;
  const cellSize = CELL_PHYSICAL_SIZE;
  const canvasW = gridW * cellSize;
  const canvasH = gridH * cellSize;
  
  resultCanvas.width = canvasW;
  resultCanvas.height = canvasH;
  resultCanvas.style.width = '100%';
  resultCanvas.style.height = 'auto';
  resultCanvas.style.imageRendering = 'crisp-edges';
  
  const ctx = resultCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  
  // 棋盘格透明背景
  const checkerSize = cellSize;
  for (let y = 0; y < canvasH; y += checkerSize) {
    for (let x = 0; x < canvasW; x += checkerSize) {
      ctx.fillStyle = ((Math.floor(x / checkerSize) + Math.floor(y / checkerSize)) % 2 === 0) ? '#f8f8f8' : '#e0e0e0';
      ctx.fillRect(x, y, checkerSize, checkerSize);
    }
  }
  
  const mode = displayMode.value;
  const codeScale = parseInt(codeScaleInput.value) / 100;
  const showCode = mode === 'code' || mode === 'gridCode';
  const showGrid = mode === 'grid' || mode === 'gridCode';
  
  // 1. 绘制色块
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const bead = grid[y][x];
      if (!bead) continue;
      ctx.fillStyle = bead.hex;
      ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
    }
  }
  
  // 2. 绘制网格线
  if (showGrid) {
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= gridW; x++) {
      ctx.beginPath();
      ctx.moveTo(x * cellSize, 0);
      ctx.lineTo(x * cellSize, canvasH);
      ctx.stroke();
    }
    for (let y = 0; y <= gridH; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellSize);
      ctx.lineTo(canvasW, y * cellSize);
      ctx.stroke();
    }
    
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 2;
    for (let x = 0; x <= gridW; x += 10) {
      ctx.beginPath();
      ctx.moveTo(x * cellSize, 0);
      ctx.lineTo(x * cellSize, canvasH);
      ctx.stroke();
    }
    for (let y = 0; y <= gridH; y += 10) {
      ctx.beginPath();
      ctx.moveTo(0, y * cellSize);
      ctx.lineTo(canvasW, y * cellSize);
      ctx.stroke();
    }
  }
  
  // 3. 绘制色号（描边+填充确保清晰）
  if (showCode) {
    const fontSize = Math.max(12, cellSize * codeScale);
    ctx.font = `bold ${fontSize}px Arial, Helvetica, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineWidth = Math.max(2, fontSize * 0.18);
    
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const bead = grid[y][x];
        if (!bead) continue;
        
        const cx = x * cellSize + cellSize / 2;
        const cy = y * cellSize + cellSize / 2;
        
        ctx.strokeStyle = isLightColor(bead.hex) ? '#ffffff' : '#000000';
        ctx.strokeText(bead.code, cx, cy);
        
        ctx.fillStyle = isLightColor(bead.hex) ? '#000000' : '#ffffff';
        ctx.fillText(bead.code, cx, cy);
      }
    }
  }
}

function renderColorList() {
  if (!resultData) return;
  const { colorCounts } = resultData;
  const sorted = [...colorCounts.entries()].sort((a, b) => b[1] - a[1]);
  
  let html = '';
  let total = 0;
  for (const [code, count] of sorted) {
    const bead = currentPalette.find(b => b.code === code);
    if (!bead) continue;
    total += count;
    html += `
      <div class="color-item">
        <div class="color-swatch" style="background: ${bead.hex}"></div>
        <span class="color-code">${code}</span>
        <span class="color-count">${count} 颗</span>
      </div>
    `;
  }
  html = `<div class="color-item" style="font-weight:600;background:#f9fafb;">
    <span>合计</span>
    <span class="color-count">${total} 颗 / ${sorted.length} 色</span>
  </div>` + html;
  
  colorListEl.innerHTML = html;
}

// 事件监听
gridWidthInput.addEventListener('input', (e) => {
  gridWidth = parseInt(e.target.value);
  document.getElementById('widthVal').textContent = gridWidth;
  if (originalImage) generateTemplate();
});

maxColorsInput.addEventListener('input', (e) => {
  maxColors = parseInt(e.target.value);
  document.getElementById('colorVal').textContent = maxColors;
  if (originalImage) generateTemplate();
});

brandSelect.addEventListener('change', updatePalette);
displayMode.addEventListener('change', drawResult);

autoRemoveBgCheckbox.addEventListener('change', () => {
  if (originalImage) generateTemplate();
});

bgToleranceInput.addEventListener('input', (e) => {
  document.getElementById('bgToleranceVal').textContent = e.target.value;
  if (originalImage && autoRemoveBgCheckbox.checked) generateTemplate();
});

codeScaleInput.addEventListener('input', (e) => {
  document.getElementById('codeScaleVal').textContent = e.target.value + '%';
  drawResult();
});

downloadBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = '拼豆模板.png';
  link.href = resultCanvas.toDataURL('image/png');
  link.click();
});

downloadListBtn.addEventListener('click', () => {
  if (!resultData) return;
  const { colorCounts } = resultData;
  const sorted = [...colorCounts.entries()].sort((a, b) => b[1] - a[1]);
  let text = '拼豆用料清单（MARD 221色）\n================\n';
  let total = 0;
  for (const [code, count] of sorted) {
    const bead = currentPalette.find(b => b.code === code);
    text += `${code}\t${count}颗\n`;
    total += count;
  }
  text += `================\n总计：${total}颗 / ${sorted.length}色`;
  
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const link = document.createElement('a');
  link.download = '拼豆色号清单.txt';
  link.href = URL.createObjectURL(blob);
  link.click();
});

// 初始化
updatePalette();
</script>
</body>
</html>
